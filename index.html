<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación Educativa: Ley de Newton</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-cielo: #bae6fd;
            --color-pasto: #4ade80;
            --color-panel: rgba(255, 255, 255, 0.85);
            --color-texto: #334155;
            --color-acento: #0ea5e9;
            --color-fuerza: #f97316;
            --color-masa: #8b5cf6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, var(--color-cielo) 60%, var(--color-pasto) 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-texto);
            overflow: hidden;
        }

        /* Nubes decorativas de fondo */
        .nube {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: moverNube 30s linear infinite;
        }
        .nube::before, .nube::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .nube1 { width: 100px; height: 30px; top: 15%; left: -100px; }
        .nube1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .nube1::after { width: 40px; height: 40px; top: -15px; left: 55px; }
        
        .nube2 { width: 120px; height: 35px; top: 30%; left: -150px; animation-duration: 45s; animation-delay: 10s;}
        .nube2::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .nube2::after { width: 50px; height: 50px; top: -20px; left: 65px; }

        @keyframes moverNube {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        /* Contenedor Principal estilo App */
        .app-contenedor {
            width: 900px;
            max-width: 95%;
            position: relative;
            z-index: 10;
        }

        .panel-controles {
            background: var(--color-panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            border: 2px solid white;
        }

        .controles-izq {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .resultado-der {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 2px dashed #cbd5e1;
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--color-acento);
            font-size: 1.8rem;
            font-weight: 900;
        }

        .control-grupo {
            display: flex;
            flex-direction: column;
        }

        .etiqueta-valor {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Estilo de los Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 3px solid;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 5px;
        }

        /* Colores específicos de sliders */
        #fuerza::-webkit-slider-thumb { border-color: var(--color-fuerza); }
        #fuerza::-webkit-slider-runnable-track { background: linear-gradient(90deg, #fdba74, #ea580c); }
        
        #masa::-webkit-slider-thumb { border-color: var(--color-masa); }
        #masa::-webkit-slider-runnable-track { background: linear-gradient(90deg, #d8b4fe, #7e22ce); }

        button {
            background-color: var(--color-acento);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0284c7;
            transition: all 0.1s;
            margin-top: 10px;
            font-family: 'Nunito', sans-serif;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0284c7;
        }

        .resultado-der h3 {
            margin: 0;
            color: #64748b;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .valor-aceleracion {
            font-size: 3rem;
            font-weight: 900;
            color: var(--color-acento);
            margin: 10px 0;
        }

        /* Entorno Físico (Simulación) */
        .escenario {
            height: 200px;
            position: relative;
            margin-top: 40px;
            border-bottom: 8px solid #166534; /* Tierra debajo del pasto */
        }

        .bloque-wrapper {
            position: absolute;
            bottom: 0;
            left: 50px;
            display: flex;
            align-items: center;
        }

        .vector-fuerza {
            height: 15px;
            width: 0px;
            background-color: var(--color-fuerza);
            position: relative;
            transition: width 0.3s ease;
            margin-right: 5px;
            border-radius: 3px;
        }
        
        .vector-fuerza::after {
            content: '';
            position: absolute;
            right: -12px;
            top: -7px;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 14px solid var(--color-fuerza);
        }

        /* El bloque ahora parece una caja de madera */
        .bloque {
            width: 70px;
            height: 70px;
            background-color: #d97706;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.1) 10px,
                rgba(0,0,0,0.1) 20px
            );
            border: 3px solid #92400e;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.15);
            font-weight: 900;
            color: white;
            font-size: 1.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .panel-controles { flex-direction: column; }
            .resultado-der { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <!-- Animación de fondo -->
    <div class="nube nube1"></div>
    <div class="nube nube2"></div>

    <div class="app-contenedor">
        
        <!-- Panel de Controles -->
        <div class="panel-controles">
            <div class="controles-izq">
                <h1>Fuerza y Movimiento</h1>
                
                <div class="control-grupo">
                    <div class="etiqueta-valor">
                        <span style="color: var(--color-fuerza);">Fuerza Aplicada</span>
                        <span id="valor-f" style="color: var(--color-fuerza);">50 N</span>
                    </div>
                    <input type="range" id="fuerza" min="0" max="200" value="50">
                </div>
                
                <div class="control-grupo">
                    <div class="etiqueta-valor">
                        <span style="color: var(--color-masa);">Masa del Objeto</span>
                        <span id="valor-m" style="color: var(--color-masa);">10 kg</span>
                    </div>
                    <input type="range" id="masa" min="1" max="50" value="10">
                </div>

                <button onclick="ejecutarSimulacion()">¡Empujar Caja!</button>
            </div>

            <div class="resultado-der">
                <h3>Aceleración</h3>
                <div class="valor-aceleracion" id="resultado-acel">0.00</div>
                <div style="color: #94a3b8; font-weight: 700;">m/s²</div>
            </div>
        </div>

        <!-- Escenario Visual -->
        <div class="escenario" id="pista">
            <div class="bloque-wrapper" id="animacion-wrapper">
                <div class="vector-fuerza" id="flecha"></div>
                <div class="bloque" id="caja-visual">10kg</div>
            </div>
        </div>

    </div>

    <script>
        // Actualizar los números al mover los deslizadores (Sliders)
        const sliderFuerza = document.getElementById('fuerza');
        const sliderMasa = document.getElementById('masa');
        const displayFuerza = document.getElementById('valor-f');
        const displayMasa = document.getElementById('valor-m');
        const cajaVisual = document.getElementById('caja-visual');
        const flecha = document.getElementById('flecha');

        sliderFuerza.oninput = function() {
            displayFuerza.innerText = this.value + ' N';
            // Actualizar el tamaño de la flecha en tiempo real
            flecha.style.width = (this.value / 2) + 'px';
        }

        sliderMasa.oninput = function() {
            displayMasa.innerText = this.value + ' kg';
            cajaVisual.innerText = this.value + 'kg';
            // Hacer la caja un poco más grande o pequeña dependiendo de la masa
            let escala = 0.8 + (this.value / 50) * 0.4; // Varía entre 0.8 y 1.2
            cajaVisual.style.transform = `scale(${escala})`;
        }

        // Inicializar tamaño de flecha al cargar
        flecha.style.width = (sliderFuerza.value / 2) + 'px';

        // Lógica de simulación
        function ejecutarSimulacion() {
            let fuerza = parseFloat(sliderFuerza.value);
            let masa = parseFloat(sliderMasa.value);
            let displayAcel = document.getElementById('resultado-acel');
            let wrapper = document.getElementById('animacion-wrapper');
            let pista = document.getElementById('pista');

            // 1. Reiniciar posición
            wrapper.style.transition = 'none';
            wrapper.style.transform = 'translateX(0)';

            // 2. Calcular
            let aceleracion = fuerza / masa;
            displayAcel.innerText = aceleracion.toFixed(2);

            // 3. Animar
            setTimeout(() => {
                if (aceleracion > 0) {
                    let tiempoAnimacion = Math.max(1, Math.min(4, 15 / aceleracion));
                    let distancia = pista.offsetWidth - wrapper.offsetWidth - 20;
                    
                    // Efecto de aceleración realista
                    wrapper.style.transition = `transform ${tiempoAnimacion}s ease-in`;
                    wrapper.style.transform = `translateX(${distancia}px)`;
                }
            }, 50);
        }
    </script>

</body>
</html>
