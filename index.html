<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación Educativa: Ley de Newton</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-cielo: #bae6fd;
            --color-pasto: #4ade80;
            --color-panel: rgba(255, 255, 255, 0.85);
            --color-texto: #334155;
            --color-acento: #0ea5e9;
            --color-fuerza: #f97316;
            --color-masa: #8b5cf6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, var(--color-cielo) 60%, var(--color-pasto) 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-texto);
            overflow: hidden;
        }

        /* Nubes decorativas de fondo */
        .nube {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: moverNube 30s linear infinite;
        }
        .nube::before, .nube::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .nube1 { width: 100px; height: 30px; top: 15%; left: -100px; }
        .nube1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .nube1::after { width: 40px; height: 40px; top: -15px; left: 55px; }
        
        .nube2 { width: 120px; height: 35px; top: 30%; left: -150px; animation-duration: 45s; animation-delay: 10s;}
        .nube2::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .nube2::after { width: 50px; height: 50px; top: -20px; left: 65px; }

        @keyframes moverNube {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        /* Contenedor Principal estilo App */
        .app-contenedor {
            width: 900px;
            max-width: 95%;
            position: relative;
            z-index: 10;
        }

        .panel-controles {
            background: var(--color-panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            border: 2px solid white;
        }

        .controles-izq {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .resultado-der {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 2px dashed #cbd5e1;
            min-width: 150px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--color-acento);
            font-size: 1.8rem;
            font-weight: 900;
        }

        .control-grupo {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* Estilo de los Inputs Numéricos */
        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: var(--color-texto);
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            background-color: white;
        }

        input[type="number"]:focus {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #fuerza:focus { border-color: var(--color-fuerza); }
        #masa:focus { border-color: var(--color-masa); }

        button {
            background-color: var(--color-acento);
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0284c7;
            transition: all 0.1s;
            margin-top: 10px;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0284c7;
        }

        .resultado-der h3 {
            margin: 0;
            color: #64748b;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .valor-aceleracion {
            font-size: 3rem;
            font-weight: 900;
            color: var(--color-acento);
            margin: 10px 0;
            word-break: break-all;
        }

        /* Entorno Físico (Simulación) */
        .escenario {
            height: 200px;
            position: relative;
            margin-top: 40px;
            border-bottom: 8px solid #166534; /* Tierra debajo del pasto */
        }

        .bloque-wrapper {
            position: absolute;
            bottom: 0;
            left: 50px;
            display: flex;
            align-items: center;
        }

        .vector-fuerza {
            height: 15px;
            width: 0px;
            background-color: var(--color-fuerza);
            position: relative;
            transition: width 0.3s ease;
            margin-right: 5px;
            border-radius: 3px;
        }
        
        .vector-fuerza::after {
            content: '';
            position: absolute;
            right: -12px;
            top: -7px;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 14px solid var(--color-fuerza);
        }

        /* Bloque caja de madera */
        .bloque {
            width: 70px;
            height: 70px;
            background-color: #d97706;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.1) 10px,
                rgba(0,0,0,0.1) 20px
            );
            border: 3px solid #92400e;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.15);
            font-weight: 900;
            color: white;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .panel-controles { flex-direction: column; }
            .resultado-der { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div class="nube nube1"></div>
    <div class="nube nube2"></div>

    <div class="app-contenedor">
        
        <div class="panel-controles">
            <div class="controles-izq">
                <h1>Fuerza y Movimiento</h1>
                
                <div class="control-grupo">
                    <label for="fuerza" style="color: var(--color-fuerza);">Fuerza Aplicada (Newtons)</label>
                    <input type="number" id="fuerza" value="50" step="any" placeholder="Ingresa la fuerza">
                </div>
                
                <div class="control-grupo">
                    <label for="masa" style="color: var(--color-masa);">Masa del Objeto (Kilogramos)</label>
                    <input type="number" id="masa" value="10" step="any" placeholder="Ingresa la masa">
                </div>

                <button onclick="ejecutarSimulacion()">¡Empujar Caja!</button>
            </div>

            <div class="resultado-der">
                <h3>Aceleración</h3>
                <div class="valor-aceleracion" id="resultado-acel">0.00</div>
                <div style="color: #94a3b8; font-weight: 700;">m/s²</div>
            </div>
        </div>

        <div class="escenario" id="pista">
            <div class="bloque-wrapper" id="animacion-wrapper">
                <div class="vector-fuerza" id="flecha"></div>
                <div class="bloque" id="caja-visual">10<br>kg</div>
            </div>
        </div>

    </div>

    <script>
        const inputFuerza = document.getElementById('fuerza');
        const inputMasa = document.getElementById('masa');
        const cajaVisual = document.getElementById('caja-visual');
        const flecha = document.getElementById('flecha');

        // Función para actualizar los gráficos en tiempo real cuando el usuario escribe
        function actualizarGraficos() {
            let fuerzaVal = parseFloat(inputFuerza.value) || 0;
            let masaVal = parseFloat(inputMasa.value) || 0;

            // Limitar visualmente el tamaño de la flecha (máximo 150px) para que no rompa el diseño
            let tamañoFlecha = Math.min(150, Math.abs(fuerzaVal) / 2);
            flecha.style.width = tamañoFlecha + 'px';

            // Ocultar la flecha si la fuerza es 0 o negativa (para este diseño básico)
            if(fuerzaVal <= 0) {
                flecha.style.display = 'none';
            } else {
                flecha.style.display = 'block';
            }

            // Actualizar texto de la caja
            cajaVisual.innerHTML = masaVal + '<br>kg';

            // Escalar la caja visualmente con un límite para que no cubra la pantalla
            if (masaVal > 0) {
                let escala = Math.min(1.5, Math.max(0.6, 0.5 + (masaVal / 50) * 0.5)); 
                cajaVisual.style.transform = `scale(${escala})`;
            }
        }

        // Escuchar cuando el usuario escribe en las cajas de texto
        inputFuerza.addEventListener('input', actualizarGraficos);
        inputMasa.addEventListener('input', actualizarGraficos);

        // Inicializar gráficos al cargar la página
        actualizarGraficos();

        function ejecutarSimulacion() {
            let fuerza = parseFloat(inputFuerza.value);
            let masa = parseFloat(inputMasa.value);
            let displayAcel = document.getElementById('resultado-acel');
            let wrapper = document.getElementById('animacion-wrapper');
            let pista = document.getElementById('pista');

            // Reiniciar posición
            wrapper.style.transition = 'none';
            wrapper.style.transform = 'translateX(0)';

            // Validaciones
            if (isNaN(fuerza) || isNaN(masa) || masa <= 0) {
                displayAcel.innerText = "ERR";
                displayAcel.style.color = "#ef4444";
                return;
            }

            // Calcular aceleración real
            let aceleracion = fuerza / masa;
            
            // Mostrar resultado (si es muy largo, cortarlo a 2 decimales)
            displayAcel.innerText = aceleracion.toFixed(2);
            displayAcel.style.color = "var(--color-acento)";

            // Animar
            setTimeout(() => {
                if (aceleracion > 0) {
                    // Adaptar el tiempo de animación para valores extremos
                    // Por muy alta que sea la aceleración, no tardará menos de 0.3s
                    // Por muy baja que sea, no tardará más de 8s
                    let tiempoAnimacion = Math.max(0.3, Math.min(8, 15 / aceleracion));
                    let distancia = pista.offsetWidth - wrapper.offsetWidth - 20;
                    
                    wrapper.style.transition = `transform ${tiempoAnimacion}s ease-in`;
                    wrapper.style.transform = `translateX(${distancia}px)`;
                }
            }, 50);
        }
    </script>

</body>
</html>
